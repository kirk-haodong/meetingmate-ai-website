<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingMate AI - 任务列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: auto;
            padding: 20px;
        }
        .app {
            max-width: 1000px;
            margin: 0 auto;
        }
        .top-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 8px;
            background: #1e293b;
            border-radius: 12px;
            overflow-x: auto;
        }
        .nav-item {
            padding: 10px 16px;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 14px;
            white-space: nowrap;
        }
        .nav-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; color: #fff; }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
        }
        .filter-btn.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-label {
            color: #64748b;
            font-size: 13px;
        }
        .task-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
        }
        .task-table-header {
            display: grid;
            grid-template-columns: 40px 2fr 100px 100px 80px 80px;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid #334155;
            color: #64748b;
            font-size: 12px;
        }
        .task-row {
            display: grid;
            grid-template-columns: 40px 2fr 100px 100px 80px 80px;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #334155;
            align-items: center;
        }
        .task-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #475569;
            border-radius: 4px;
        }
        .task-title { color: #fff; font-size: 14px; }
        .task-source { color: #64748b; font-size: 12px; }
        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
        }
        .priority {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .priority-high {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-nav">
            <div class="nav-item">📋 会议纪要</div>
            <div class="nav-item active">✅ 任务列表</div>
            <div class="nav-item">🔍 知识库</div>
            <div class="nav-item">⏰ 自动提醒</div>
            <div class="nav-item">📊 效率分析</div>
        </div>
        
        <div class="header">
            <h1>任务列表</h1>
        </div>
        
        <div class="filter-bar">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">待处理</button>
            <button class="filter-btn">进行中</button>
            <button class="filter-btn">已逾期</button>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value">5</div>
                <div class="stat-label">待办任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #f87171;">1</div>
                <div class="stat-label">已逾期</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #34d399;">12</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>
        
        <div class="task-table">
            <div class="task-table-header">
                <div></div>
                <div>任务内容</div>
                <div>负责人</div>
                <div>截止日期</div>
                <div>优先级</div>
                <div>状态</div>
            </div>
            
            <div class="task-row">
                <div><div class="task-checkbox"></div></div>
                <div>
                    <div class="task-title">完成用户调研报告</div>
                    <div class="task-source">来自：产品周会</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;"><div class="avatar">张</div><span style="font-size:13px;">张三</span></div>
                <div style="color:#94a3b8;font-size:13px;">3月20日</div>
                <div><span class="priority priority-high">高</span></div>
                <div><span class="status">待处理</span></div>
            </div>
            
            <div class="task-row">
                <div><div class="task-checkbox"></div></div>
                <div>
                    <div class="task-title">设计新版首页原型</div>
                    <div class="task-source">来自：产品周会</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;"><div class="avatar">李</div><span style="font-size:13px;">李四</span></div>
                <div style="color:#94a3b8;font-size:13px;">3月22日</div>
                <div><span class="priority priority-high">高</span></div>
                <div><span class="status">进行中</span></div>
            </div>
            
            <div class="task-row">
                <div><div class="task-checkbox"></div></div>
                <div>
                    <div class="task-title">更新API文档 ⚠️ 逾期</div>
                    <div class="task-source">来自：技术评审会</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;"><div class="avatar">张</div><span style="font-size:13px;">张三</span></div>
                <div style="color:#f87171;font-size:13px;">3月18日</div>
                <div><span class="priority priority-high">高</span></div>
                <div><span class="status">待处理</span></div>
            </div>
        </div>
    </div>
</body>
</html>
