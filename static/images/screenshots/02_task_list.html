<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingMate AI - 任务列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: auto;
        }
        .app {
            display: flex;
            height: 100%;
        }
        .sidebar {
            width: 240px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #fff;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .nav-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
        .main {
            flex: 1;
            padding: 30px;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 28px; color: #fff; }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 14px;
        }
        .filter-btn.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
        .task-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
        }
        .task-table-header {
            display: grid;
            grid-template-columns: 40px 2fr 100px 120px 100px 80px;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid #334155;
            color: #64748b;
            font-size: 13px;
        }
        .task-row {
            display: grid;
            grid-template-columns: 40px 2fr 100px 120px 100px 80px;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            align-items: center;
        }
        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #475569;
            border-radius: 4px;
        }
        .task-title { color: #fff; font-weight: 500; }
        .task-source { color: #64748b; font-size: 13px; }
        .assignee {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
        }
        .priority {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .priority-high {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .priority-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }
        .deadline {
            color: #94a3b8;
            font-size: 13px;
        }
        .deadline.overdue {
            color: #f87171;
        }
        .status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        .status-progress {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">🦞 MeetingMate</div>
            <nav>
                <div class="nav-item">📋 会议纪要</div>
                <div class="nav-item active">✅ 任务列表</div>
                <div class="nav-item">🔍 知识库</div>
                <div class="nav-item">📊 效率分析</div>
            </nav>
        </aside>
        <main class="main">
            <div class="header">
                <h1>任务列表</h1>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active">全部</button>
                <button class="filter-btn">待处理</button>
                <button class="filter-btn">进行中</button>
                <button class="filter-btn">已逾期</button>
            </div>
            
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value">5</div>
                    <div class="stat-label">待办任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #f87171;">1</div>
                    <div class="stat-label">已逾期</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #34d399;">12</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>
            
            <div class="task-table">
                <div class="task-table-header">
                    <div></div>
                    <div>任务内容</div>
                    <div>负责人</div>
                    <div>截止日期</div>
                    <div>优先级</div>
                    <div>状态</div>
                </div>
                
                <div class="task-row">
                    <div><div class="task-checkbox"></div></div>
                    <div>
                        <div class="task-title">完成用户调研报告</div>
                        <div class="task-source">来自：产品周会</div>
                    </div>
                    <div class="assignee">
                        <div class="avatar">张</div>
                        <span>张三</span>
                    </div>
                    <div class="deadline">3月20日</div>
                    <div><span class="priority priority-high">高</span></div>
                    <div><span class="status status-pending">待处理</span></div>
                </div>
                
                <div class="task-row">
                    <div><div class="task-checkbox"></div></div>
                    <div>
                        <div class="task-title">设计新版首页原型</div>
                        <div class="task-source">来自：产品周会</div>
                    </div>
                    <div class="assignee">
                        <div class="avatar">李</div>
                        <span>李四</span>
                    </div>
                    <div class="deadline">3月22日</div>
                    <div><span class="priority priority-high">高</span></div>
                    <div><span class="status status-progress">进行中</span></div>
                </div>
                
                <div class="task-row">
                    <div><div class="task-checkbox"></div></div>
                    <div>
                        <div class="task-title">更新API文档 ⚠️ 逾期</div>
                        <div class="task-source">来自：技术评审会</div>
                    </div>
                    <div class="assignee">
                        <div class="avatar">张</div>
                        <span>张三</span>
                    </div>
                    <div class="deadline overdue">3月18日</div>
                    <div><span class="priority priority-high">高</span></div>
                    <div><span class="status status-pending">待处理</span></div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
