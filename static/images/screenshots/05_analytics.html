<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingMate AI - 效率分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: auto;
            padding: 20px;
        }
        .app {
            max-width: 1000px;
            margin: 0 auto;
        }
        .top-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 8px;
            background: #1e293b;
            border-radius: 12px;
            overflow-x: auto;
        }
        .nav-item {
            padding: 10px 16px;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 14px;
            white-space: nowrap;
        }
        .nav-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; color: #fff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-label {
            color: #64748b;
            font-size: 12px;
        }
        .stat-change {
            font-size: 12px;
            margin-top: 6px;
        }
        .stat-change.up { color: #34d399; }
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .chart-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .chart-title {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .bar-chart {
            display: flex;
            align-items: end;
            gap: 20px;
            height: 140px;
            padding: 10px 0;
        }
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .bar {
            width: 50px;
            background: linear-gradient(180deg, #3b82f6, #2563eb);
            border-radius: 6px 6px 0 0;
        }
        .bar-label {
            color: #64748b;
            font-size: 12px;
        }
        .bar-value {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
        }
        .pie-chart {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                #3b82f6 0deg 150deg,
                #8b5cf6 150deg 270deg,
                #10b981 270deg 360deg
            );
            margin: 0 auto 16px;
            position: relative;
        }
        .pie-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .legend-text { color: #94a3b8; }
        .legend-value { color: #fff; margin-left: auto; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-nav">
            <div class="nav-item">📋 会议纪要</div>
            <div class="nav-item">✅ 任务列表</div>
            <div class="nav-item">🔍 知识库</div>
            <div class="nav-item">⏰ 自动提醒</div>
            <div class="nav-item active">📊 效率分析</div>
        </div>
        
        <div class="header">
            <h1>📊 效率分析</h1>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value">12</div>
                <div class="stat-label">本月会议数</div>
                <div class="stat-change up">↑ 20%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value">18.5</div>
                <div class="stat-label">总时长(h)</div>
                <div class="stat-change up">↓ 15%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" style="color: #34d399;">85%</div>
                <div class="stat-label">任务完成率</div>
                <div class="stat-change up">↑ 12%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value">52</div>
                <div class="stat-label">平均时长(分)</div>
                <div class="stat-change up">↓ 8分</div>
            </div>
        </div>
        
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">📈 每周会议时长趋势</div>
                <div class="bar-chart">
                    <div class="bar-item">
                        <div class="bar-value">4.5h</div>
                        <div class="bar" style="height: 50px;"></div>
                        <div class="bar-label">第1周</div>
                    </div>
                    <div class="bar-item">
                        <div class="bar-value">6.0h</div>
                        <div class="bar" style="height: 80px;"></div>
                        <div class="bar-label">第2周</div>
                    </div>
                    <div class="bar-item">
                        <div class="bar-value">3.5h</div>
                        <div class="bar" style="height: 40px;"></div>
                        <div class="bar-label">第3周</div>
                    </div>
                    <div class="bar-item">
                        <div class="bar-value">4.5h</div>
                        <div class="bar" style="height: 50px;"></div>
                        <div class="bar-label">第4周</div>
                    </div>
                </div>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">🥧 会议类型分布</div>
                <div class="pie-chart">
                    <div class="pie-center">12</div>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #3b82f6;"></div>
                        <span class="legend-text">产品会议</span>
                        <span class="legend-value">5</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #8b5cf6;"></div>
                        <span class="legend-text">技术评审</span>
                        <span class="legend-value">4</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #10b981;"></div>
                        <span class="legend-text">客户沟通</span>
                        <span class="legend-value">3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
