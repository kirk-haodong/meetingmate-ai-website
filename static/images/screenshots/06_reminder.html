<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingMate AI - 自动提醒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: auto;
        }
        .app {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 20px;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #fff;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .nav-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
        }
        .main {
            flex: 1;
            padding: 30px;
            overflow: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 28px; color: #fff; }
        .reminder-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
        }
        .tab.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .channel-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .channel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .channel-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .channel-info h3 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .channel-info p {
            color: #64748b;
            font-size: 13px;
        }
        .channel-status {
            margin-left: auto;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-radius: 20px;
            font-size: 12px;
        }
        .reminder-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .reminder-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-left: 3px solid #2563eb;
        }
        .reminder-time {
            width: 80px;
            color: #60a5fa;
            font-weight: 600;
            font-size: 14px;
        }
        .reminder-content {
            flex: 1;
        }
        .reminder-title {
            color: #fff;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .reminder-desc {
            color: #64748b;
            font-size: 12px;
        }
        .reminder-target {
            padding: 4px 10px;
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border-radius: 4px;
            font-size: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">🦞 MeetingMate</div>
            <nav>
                <div class="nav-item">📋 会议纪要</div>
                <div class="nav-item">✅ 任务列表</div>
                <div class="nav-item">🔍 知识库</div>
                <div class="nav-item active">⏰ 自动提醒</div>
            </nav>
        </aside>
        <main class="main">
            <div class="header">
                <h1>⏰ 自动提醒设置</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" style="color: #34d399;">156</div>
                    <div class="stat-label">本月已发送</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">98.5%</div>
                    <div class="stat-label">送达成功率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #fbbf24;">12</div>
                    <div class="stat-label">待发送</div>
                </div>
            </div>
            
            <div class="reminder-tabs">
                <button class="tab active">全部渠道</button>
                <button class="tab">邮件</button>
                <button class="tab">飞书</button>
                <button class="tab">钉钉</button>
                <button class="tab">企微</button>
            </div>
            
            <div class="channel-section">
                <div class="channel-header">
                    <div class="channel-icon">📧</div>
                    <div class="channel-info">
                        <h3>邮件通知</h3>
                        <p>会议纪要自动发送给参会人员</p>
                    </div>
                    <span class="channel-status">✓ 已启用</span>
                </div>
                
                <div class="reminder-list">
                    <div class="reminder-item">
                        <span class="reminder-time">会前</span>
                        <div class="reminder-content">
                            <div class="reminder-title">会议开始提醒</div>
                            <div class="reminder-desc">会议开始前5分钟发送提醒</div>
                        </div>
                        <span class="reminder-target">所有参会人</span>
                    </div>
                    
                    <div class="reminder-item">
                        <span class="reminder-time">会后</span>
                        <div class="reminder-content">
                            <div class="reminder-title">会议纪要发送</div>
                            <div class="reminder-desc">会议结束5分钟内自动发送纪要</div>
                        </div>
                        <span class="reminder-target">所有参会人</span>
                    </div>
                    
                    <div class="reminder-item">
                        <span class="reminder-time">到期前</span>
                        <div class="reminder-content">
                            <div class="reminder-title">任务截止提醒</div>
                            <div class="reminder-desc">任务到期前1天、4小时、1小时提醒</div>
                        </div>
                        <span class="reminder-target">任务负责人</span>
                    </div>
                    
                    <div class="reminder-item">
                        <span class="reminder-time" style="color: #f87171;">逾期</span>
                        <div class="reminder-content">
                            <div class="reminder-title">逾期升级提醒</div>
                            <div class="reminder-desc">任务逾期自动抄送上级</div>
                        </div>
                        <span class="reminder-target">上级+负责人</span>
                    </div>
                </div>
            </div>
            
            <div class="channel-section">
                <div class="channel-header">
                    <div class="channel-icon" style="background: linear-gradient(135deg, #10b981, #059669);">💬</div>
                    <div class="channel-info">
                        <h3>飞书机器人</h3>
                        <p>群聊Bot推送+个人消息</p>
                    </div>
                    <span class="channel-status">✓ 已启用</span>
                </div>
            </div>
            
            <div class="channel-section">
                <div class="channel-header">
                    <div class="channel-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);">🔔</div>
                    <div class="channel-info">
                        <h3>钉钉机器人</h3>
                        <p>工作通知+待办提醒</p>
                    </div>
                    <span class="channel-status">✓ 已启用</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
